# Watches the upstream BRUHsailer guide data and opens a PR here whenever
# it changes. The PR carries the refreshed guide JSON plus regenerated
# annotation drafts (earlier verifier verdicts and rejections are carried
# over for unchanged steps — see tools/extract-annotations.mjs).
#
# The human stays in the loop: review the PR, run the verifier on the new
# drafts (node tools/verify-annotations.mjs — needs ANTHROPIC_API_KEY, or
# ask Claude to verify in-session), review-annotations.mjs, then merge.
#
# One-time repo setting for this to work:
#   Settings -> Actions -> General -> Workflow permissions:
#   "Read and write permissions" + "Allow GitHub Actions to create and
#   approve pull requests".
name: Guide refresh

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch upstream guide data
        run: |
          curl -fsSL --retry 3 \
            https://raw.githubusercontent.com/umkyzn/BRUHsailer/main/data/guide_data.json \
            -o /tmp/guide_data.json

      - name: Sanity-check the download
        # A truncated or malformed regeneration must not become a PR.
        run: |
          node -e "
            const g = JSON.parse(require('fs').readFileSync('/tmp/guide_data.json', 'utf8'));
            const steps = g.chapters.flatMap(c => c.sections).flatMap(s => s.steps).length;
            if (!g.updatedOn || !g.title || steps < 100) {
              throw new Error('upstream guide data looks wrong: ' + steps + ' steps');
            }
            console.log('upstream ' + g.updatedOn + ', ' + steps + ' steps - OK');
          "

      - name: Apply if changed
        id: apply
        run: |
          DEST=src/main/resources/com/bruhsailer/guide/guide_data.json
          if cmp -s /tmp/guide_data.json "$DEST"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Guide data unchanged upstream - nothing to do."
          else
            cp /tmp/guide_data.json "$DEST"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "updated_on=$(node -p "require('/tmp/guide_data.json').updatedOn")" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate annotation drafts
        if: steps.apply.outputs.changed == 'true'
        # Carries over verdicts/rejections for unchanged steps; only
        # new/edited steps arrive unverified.
        run: node tools/extract-annotations.mjs

      - name: Open pull request
        if: steps.apply.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: guide-refresh/upstream
          commit-message: 'Refresh guide data from upstream (${{ steps.apply.outputs.updated_on }})'
          title: 'Guide refresh: upstream ${{ steps.apply.outputs.updated_on }}'
          body: |
            The BRUHsailer guide data changed upstream
            ([umkyzn/BRUHsailer](https://github.com/umkyzn/BRUHsailer)).
            This PR updates the bundled copy and regenerates the annotation
            drafts — verdicts and rejections for unchanged steps were
            carried over, so only new or edited steps need attention.

            Before merging:
            1. `node tools/verify-annotations.mjs` (verifies only the new
               drafts; needs `ANTHROPIC_API_KEY`) — or have Claude verify
               them in-session.
            2. `node tools/review-annotations.mjs` and approve.
            3. `gradlew test`, then a quick in-game sanity check.

            Progress and captured locations for steps that were merely
            edited upstream are re-linked automatically at plugin startup
            (GuideManifest remapping).
          labels: guide-refresh
          delete-branch: true
